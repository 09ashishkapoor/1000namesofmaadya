name: Validate Site Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Validate presence of required files
        run: |
          required=(index.html app.js styles.css navigation.js navigation.css sahasranama_meanings.json sw.js)
          missing=()
          for f in "${required[@]}"; do
            if [ ! -f "$f" ]; then
              echo "Missing $f"
              missing+=("$f")
            fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "ERROR: Missing files: ${missing[*]}"
            exit 1
          fi

      - name: Validate service worker precache entries
        run: |
          python - <<'PY'
import sys
from pathlib import Path
sw = Path('sw.js')
if not sw.exists():
    print('sw.js not found')
    sys.exit(1)
txt = sw.read_text(encoding='utf-8')
if 'assets/' in txt:
    print('sw.js contains assets/ entries (likely missing asset paths). Please regenerate sw.js from the build output.')
    sys.exit(1)
print('sw.js precache check passed')
PY

      - name: Validate `_headers` format
        run: |
          if [ -f "_headers" ]; then
            bad=$(awk '/^[^#]/{if($1 !~ /^\//) print $0}' _headers || true)
            if [ -n "$bad" ]; then
              echo "Invalid _headers lines (paths must start with '/'):"; echo "$bad"; exit 1
            fi
          fi
