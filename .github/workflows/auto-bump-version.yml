name: Auto bump site version

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'public/version.json'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-version:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump site version
        env:
          BUMP_VERSION_COMMIT: "false"
        run: npm run bump-version

      - name: Create pull request with bumped version
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ github.token }}
          branch: auto/version-bump
          commit-message: "chore: auto-increment site version"
          title: "chore: auto-increment site version"
          body: "Automated version bump generated by GitHub Actions."
          delete-branch: true