name: Auto Increment Version

on:
  push:
    branches:
      - main
    # Only ignore version.json itself to prevent infinite loops
    # All other commits will trigger version increment
    paths-ignore:
      - 'version.json'

jobs:
  increment-version:
    runs-on: ubuntu-latest
    # Run on every push to main, unless explicitly skipped
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip version]')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Read current version
        id: read_version
        run: |
          # Prefer version.json; if missing, try to derive from the latest git tag;
          # if neither is available, fall back to 0.0 so the auto-increment still works.
          if [ -f version.json ]; then
            CURRENT_VERSION=$(node -e "console.log(require('./version.json').version)")
            echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          else
            # Try to get latest annotated tag (strip leading 'v' if present)
            TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -n "$TAG" ]; then
              TAG=${TAG#v}
              echo "current=$TAG" >> $GITHUB_OUTPUT
            else
              echo "current=0.0" >> $GITHUB_OUTPUT
            fi
          fi
      
      - name: Increment version
        id: increment_version
        run: |
          CURRENT="${{ steps.read_version.outputs.current }}"
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          
          # Increment minor version
          NEW_MINOR=$((MINOR + 1))
          NEW_VERSION="${MAJOR}.${NEW_MINOR}"
          
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT"
          echo "New version: $NEW_VERSION"
      
      - name: Update version.json
        run: |
          NEW_VERSION="${{ steps.increment_version.outputs.new }}"
          # buildDate represents when the version was last updated (tied to version increment)
          BUILD_DATE=$(date -u +"%Y-%m-%d")
          
          cat > version.json << EOF
          {
            "version": "$NEW_VERSION",
            "buildDate": "$BUILD_DATE"
          }
          EOF
          
          echo "Updated version.json:"
          cat version.json
          echo "Version $NEW_VERSION updated on $BUILD_DATE"
      
      - name: Commit and push version update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add version.json
          git diff --staged --quiet || (git commit -m "chore: auto-increment version to ${{ steps.increment_version.outputs.new }} [skip version]" && git push)

